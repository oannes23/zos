# Zos Configuration Example
# Copy this file to config.yml and customize

discord:
  # Token should be set via ZOS_DISCORD__TOKEN environment variable
  # token: "your-bot-token-here"

  # Guild (server) names to watch (empty = all guilds bot is in)
  guilds: []
    # - "My Discord Server"
    # - "Another Server"

  # Channels to EXCLUDE from observation (opt-out by name)
  # By default, Zos observes all channels it has access to
  excluded_channels:
    - bot-spam
    - admin-only
    - mod-logs

  # Channels where Zos can send messages (by name)
  output_channels:
    - zos-thoughts
    - general

  # Role required for user tracking (optional)
  # Users without this role: messages stored but zero salience (not reflected upon)
  # Users with this role: full tracking and reflection
  # Leave empty/null to track all users
  tracking_opt_in_role: "Zos Participant"

database:
  # SQLite database location
  path: "data/zos.db"

budget:
  # Total token budget per reflection run
  total_tokens_per_run: 100000

  # Maximum tokens per individual topic
  per_topic_cap: 10000

  # Category weights for budget allocation (must sum to 100 for percentages)
  category_weights:
    user: 40
    channel: 40
    user_in_channel: 15
    dyad: 5
    dyad_in_channel: 0

salience:
  # Weights for salience earning per activity type
  earning_weights:
    message: 1.0           # Base points per message sent
    reaction_given: 0.5    # Points for giving a reaction
    reaction_received: 0.3 # Points for receiving a reaction
    mention: 0.5           # Bonus points for mentions/replies (added to dyad keys)

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # Optional log file
  # file: "logs/zos.log"

# Directory containing layer definitions
layers_dir: "layers"

# Enabled layers (by directory name)
enabled_layers:
  # - channel_digest
  # - social_dynamics
