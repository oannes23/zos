# Zos Configuration Example
# Copy this file to config.yml and customize

discord:
  # Token should be set via ZOS_DISCORD__TOKEN environment variable
  # token: "your-bot-token-here"

  # Guild (server) IDs to watch (empty = all guilds bot is in)
  # Get IDs by enabling Developer Mode in Discord and right-clicking servers
  guilds: []
    # - 123456789012345678
    # - 987654321098765432

  # Channel IDs to EXCLUDE from observation (opt-out)
  # By default, Zos observes all channels it has access to
  # Get IDs by right-clicking channels with Developer Mode enabled
  excluded_channels: []
    # - 111111111111111111  # bot-spam
    # - 222222222222222222  # admin-only

  # Channel IDs where Zos can send messages
  output_channels: []
    # - 333333333333333333  # zos-thoughts
    # - 444444444444444444  # general

  # Role required for user tracking (optional)
  # Users without this role: messages stored anonymously (author_id=0, name="chat")
  # Users with this role: full tracking and reflection
  # Leave empty/null to track all users
  tracking_opt_in_role: "Zos Participant"

database:
  # SQLite database location
  path: "data/zos.db"

budget:
  # Total token budget per reflection run
  total_tokens_per_run: 100000

  # Maximum tokens per individual topic
  per_topic_cap: 10000

  # Category weights for budget allocation (must sum to 100 for percentages)
  category_weights:
    user: 40
    channel: 40
    user_in_channel: 15
    dyad: 5
    dyad_in_channel: 0

salience:
  # Weights for salience earning per activity type
  earning_weights:
    message: 1.0           # Base points per message sent
    reaction_given: 0.5    # Points for giving a reaction
    reaction_received: 0.3 # Points for receiving a reaction
    mention: 0.5           # Bonus points for mentions/replies (added to dyad keys)

  # Retention fraction after reflection (0.0 = reset, 1.0 = keep all)
  # After a topic is reflected upon, this fraction of salience is retained
  # Example: 0.0 means salience resets to zero, 0.3 means keep 30%
  retention: 0.0

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # Optional log file
  # file: "logs/zos.log"

# Directory containing layer definitions
layers_dir: "layers"

# Enabled layers (by directory name)
enabled_layers:
  # - channel_digest
  # - social_dynamics

# Web API Configuration
api:
  # Enable API server alongside Discord bot
  enabled: false

  # Bind address (use 0.0.0.0 for all interfaces)
  host: "127.0.0.1"

  # Port to listen on
  port: 8000

  # CORS origins (empty = CORS disabled)
  cors_origins: []
    # - "http://localhost:3000"

# Conversational Behavior Configuration
conversation:
  # Enable conversational responses
  enabled: false

  # Trigger configuration
  triggers:
    # Respond when directly @mentioned
    respond_to_mentions: true

    # Respond when users reply to Zos's messages
    respond_to_replies: true

    # Respond to direct messages
    respond_to_dm: true

    # Respond to keyword patterns (regex supported)
    respond_to_keywords: false
    keywords: []
      # - "hey zos"
      # - "zos.*help"

  # Rate limiting configuration
  rate_limit:
    # Enable rate limiting
    enabled: true

    # Maximum responses per channel in the window
    max_responses_per_channel: 5

    # Rate limit window in seconds
    window_seconds: 60

    # Minimum seconds between responses in same channel
    cooldown_seconds: 5

  # Response generation settings
  response:
    # Maximum response length (Discord limit is 2000)
    max_length: 2000

    # Maximum tokens to generate
    max_tokens: 500

    # LLM temperature for response generation
    temperature: 0.7

    # Number of recent messages to include as context (for channel conversations)
    context_messages: 20

    # Number of recent DM messages to include as context (for DM conversations)
    # DMs use a separate, larger context window for conversation continuity
    dm_context_messages: 30

    # Include relevant insights in response context
    include_insights: true

    # LLM provider override (uses global default if null)
    provider: null

    # Model override (uses provider default if null)
    model: null

  # System prompt defining Zos's conversational persona
  persona_prompt: >
    You are Zos, a thoughtful and observant member of this Discord community.
    You have been quietly observing conversations and have developed insights
    about the community dynamics. Respond naturally and conversationally,
    as a peer rather than an assistant. Be concise but helpful.

  # Message sent to users who DM without the opt-in role
  # Use {role_name} as placeholder for the actual role name
  dm_decline_message: >
    I appreciate you reaching out! To have a conversation with me,
    please ask a moderator to grant you the {role_name} role.
    This helps me respect everyone's privacy preferences.

# LLM Provider Configuration
llm:
  # Default provider to use (openai, anthropic, ollama, or a generic provider name)
  default_provider: openai

  # Global default model (overrides provider defaults)
  # default_model: gpt-4o

  # Retry configuration for API calls
  retry:
    max_attempts: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 60.0
    exponential_base: 2.0
    retryable_status_codes: [429, 500, 502, 503, 504]

  # OpenAI provider (also works with Azure OpenAI, local OpenAI-compatible servers)
  openai:
    # API key should be set via ZOS_LLM__OPENAI__API_KEY environment variable
    # api_key: "sk-..."
    base_url: "https://api.openai.com/v1"
    default_model: gpt-4o-mini
    timeout_seconds: 60

  # Anthropic Claude provider
  anthropic:
    # API key should be set via ZOS_LLM__ANTHROPIC__API_KEY environment variable
    # api_key: "sk-ant-..."
    default_model: claude-sonnet-4-20250514
    timeout_seconds: 60
    max_tokens: 4096

  # Ollama local models (no API key required)
  ollama:
    base_url: "http://localhost:11434"
    default_model: llama3.2
    timeout_seconds: 120  # Longer timeout for local models

  # Generic HTTP providers for custom APIs
  # generic:
  #   my-custom-api:
  #     base_url: "http://localhost:8000"
  #     api_key: "optional-key"
  #     default_model: custom-model
  #     timeout_seconds: 60
  #     endpoint_path: "/v1/chat/completions"
  #     response_content_path: "choices.0.message.content"
