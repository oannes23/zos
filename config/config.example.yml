# Zos Configuration Example
# Copy this file to config.yml and customize

discord:
  # Token should be set via ZOS_DISCORD__TOKEN environment variable
  # token: "your-bot-token-here"

  # Guild (server) IDs to watch
  guild_ids:
    - 123456789012345678

  # Channels to observe (all messages logged)
  watched_channel_ids:
    - 123456789012345678
    - 234567890123456789

  # Channels where Zos can speak
  output_channel_ids:
    - 123456789012345678

  # Role required for DM opt-in (optional)
  required_role: "zos-dm-enabled"

database:
  # SQLite database location
  path: "data/zos.db"

budget:
  # Total token budget per reflection run
  total_tokens_per_run: 100000

  # Maximum tokens per individual topic
  per_topic_cap: 10000

  # Category weights for budget allocation
  category_weights:
    user: 20
    channel: 20
    user_in_channel: 10
    dyad: 5
    dyad_in_channel: 5

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # Optional log file
  # file: "logs/zos.log"

# Directory containing layer definitions
layers_dir: "layers"

# Enabled layers (by directory name)
enabled_layers:
  # - channel_digest
  # - social_dynamics
